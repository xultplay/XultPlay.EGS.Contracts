name: Build, Test, and Publish to GitHub Packages
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
env:
  DOTNET_VERSION: '8.0.x'
  CONFIGURATION: Release
  SOLUTION: XultPlay.EGS.Contracts.sln
  PACKAGE_PROJECT: src/XultPlay.EGS.Contracts/XultPlay.EGS.Contracts.csproj
  ARTIFACTS_DIR: ./artifacts
  GITHUB_PACKAGES_URL: https://nuget.pkg.github.com/xultplay/index.json
permissions:
  contents: read
  packages: write
jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Add GitHub Packages NuGet source
        run: |
          dotnet nuget add source "${{ env.GITHUB_PACKAGES_URL }}" \
            --name github-xultplay \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text
      - run: dotnet restore ${{ env.SOLUTION }}
      - run: dotnet format ${{ env.SOLUTION }} --verify-no-changes --no-restore
      - run: dotnet build ${{ env.SOLUTION }} --configuration ${{ env.CONFIGURATION }} --no-restore -warnaserror
      - run: dotnet test ${{ env.SOLUTION }} --configuration ${{ env.CONFIGURATION }} --no-build
  pack-and-publish:
    name: Pack and Publish
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Add GitHub Packages NuGet source
        run: |
          dotnet nuget add source "${{ env.GITHUB_PACKAGES_URL }}" \
            --name github-xultplay \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text
      - id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - run: dotnet restore ${{ env.SOLUTION }}
      - run: dotnet build ${{ env.PACKAGE_PROJECT }} --configuration ${{ env.CONFIGURATION }} --no-restore -warnaserror
      - run: dotnet pack ${{ env.PACKAGE_PROJECT }} --configuration ${{ env.CONFIGURATION }} --no-build --output ${{ env.ARTIFACTS_DIR }} -p:PackageVersion=${{ steps.version.outputs.version }}
      - run: dotnet nuget push "${{ env.ARTIFACTS_DIR }}/*.nupkg" --api-key "${{ secrets.GITHUB_TOKEN }}" --source "${{ env.GITHUB_PACKAGES_URL }}" --skip-duplicate